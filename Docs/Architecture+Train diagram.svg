<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#070A12"/>
    </linearGradient>

    <!-- Subtle panel gradient -->
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F162A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0C1222" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowBlue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.20
                0 0 0 0 0.55
                0 0 0 0 1.00
                0 0 0 0.8 0" result="blueGlow"/>
      <feMerge>
        <feMergeNode in="blueGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowPurple" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.75
                0 0 0 0 0.35
                0 0 0 0 1.00
                0 0 0 0.75 0" result="pGlow"/>
      <feMerge>
        <feMergeNode in="pGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowAmber" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 1.00
                0 0 0 0 0.65
                0 0 0 0 0.20
                0 0 0 0.70 0" result="aGlow"/>
      <feMerge>
        <feMergeNode in="aGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowGreen" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.15
                0 0 0 0 0.95
                0 0 0 0 0.55
                0 0 0 0.70 0" result="gGlow"/>
      <feMerge>
        <feMergeNode in="gGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A9B3D1" opacity="0.9"/>
    </marker>

    <!-- Fonts -->
    <style>
      .title { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; font-size: 24px; fill: #EAF0FF; font-weight: 700; }
      .subtitle { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; font-size: 14px; fill: #B8C2E3; }
      .groupLabel { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; font-size: 14px; fill: #EAF0FF; font-weight: 700; letter-spacing: 0.8px; }
      .boxTitle { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; font-size: 14px; fill: #EAF0FF; font-weight: 700; }
      .boxText { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; font-size: 12px; fill: #C9D3F2; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-size: 12px; fill: #C9D3F2; }
      .hint { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; font-size: 11px; fill: #98A4C9; }
      .strokeBlue { stroke: #2F7BFF; }
      .strokePurple { stroke: #B25CFF; }
      .strokeAmber { stroke: #FFB84A; }
      .strokeGreen { stroke: #2BE28A; }
      .panel { fill: url(#panelGrad); stroke-width: 2; rx: 18; ry: 18; }
      .node { fill: rgba(16,22,40,0.95); stroke-width: 1.5; rx: 14; ry: 14; }
      .arrow { stroke: #A9B3D1; stroke-width: 2; fill: none; marker-end: url(#arrow); opacity: 0.85; }
      .arrowSoft { stroke: #7F8AB0; stroke-width: 2; fill: none; marker-end: url(#arrow); opacity: 0.55; }
      .divider { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1800" height="1000" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="40" y="48" class="title">End-to-End 1D Grid-Agnostic Closed-Loop Training &amp; Evaluation (exp8.1)</text>
  <text x="40" y="76" class="subtitle">Native grid (N0=512) + multi-divisor training (d∈{1,2,4}), jump training + scheduled sampling, FFT/grad/stat regularizers</text>

  <!-- ===================== GROUP 1: DATA PREPARATION ===================== -->
  <rect x="35" y="110" width="1730" height="235" class="panel strokeBlue" filter="url(#glowBlue)"/>
  <text x="60" y="138" class="groupLabel">DATA PREPARATION</text>
  <line x1="50" y1="150" x2="1750" y2="150" class="divider"/>

  <!-- Data prep nodes -->
  <!-- Node function: x,y,w,h -->
  <!-- Row 1 -->
  <g>
    <rect x="60" y="175" width="190" height="62" class="node strokeBlue"/>
    <text x="78" y="198" class="boxTitle">Load arrays</text>
    <text x="78" y="218" class="mono">X_train/X_val/X_test</text>
    <text x="78" y="235" class="mono">y_train/y_val/y_test</text>
  </g>

  <g>
    <rect x="270" y="175" width="195" height="62" class="node strokeBlue"/>
    <text x="288" y="198" class="boxTitle">Concatenate</text>
    <text x="288" y="220" class="mono">X_all, Y_all</text>
    <text x="288" y="238" class="hint">shape: [T, N0]</text>
  </g>

  <g>
    <rect x="485" y="175" width="250" height="62" class="node strokeBlue"/>
    <text x="503" y="198" class="boxTitle">Chain build (adjacency)</text>
    <text x="503" y="220" class="mono">mean(|Y[i]-X[i+1]|) &lt; eps</text>
    <text x="503" y="238" class="mono">eps=0.002 → chains_cache.npz</text>
  </g>

  <g>
    <rect x="755" y="175" width="235" height="62" class="node strokeBlue"/>
    <text x="773" y="198" class="boxTitle">Split chains</text>
    <text x="773" y="220" class="mono">train/val/test segments</text>
    <text x="773" y="238" class="hint">70% / 15% / 15%</text>
  </g>

  <g>
    <rect x="1010" y="175" width="245" height="62" class="node strokeBlue"/>
    <text x="1028" y="198" class="boxTitle">Sample indices</text>
    <text x="1028" y="220" class="mono">i ∈ [s+2, e-Kmax]</text>
    <text x="1028" y="238" class="mono">Kmax = 8</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="60" y="255" width="220" height="70" class="node strokeBlue"/>
    <text x="78" y="279" class="boxTitle">Choose divisor</text>
    <text x="78" y="301" class="mono">d ∈ {1, 2, 4}</text>
    <text x="78" y="319" class="hint">random per step</text>
  </g>

  <g>
    <rect x="300" y="255" width="260" height="70" class="node strokeBlue"/>
    <text x="318" y="279" class="boxTitle">Downsample (area-average)</text>
    <text x="318" y="301" class="mono">N = N0 / d</text>
    <text x="318" y="319" class="mono">u_hi.reshape(...,N,r).mean</text>
  </g>

  <g>
    <rect x="580" y="255" width="245" height="70" class="node strokeBlue"/>
    <text x="598" y="279" class="boxTitle">Positional encoding</text>
    <text x="598" y="301" class="mono">PE(x): sin/cos @ freqs</text>
    <text x="598" y="319" class="mono">freqs=(1,2,4,8)</text>
  </g>

  <g>
    <rect x="845" y="255" width="320" height="70" class="node strokeBlue"/>
    <text x="863" y="279" class="boxTitle">Dataset item (ClosedLoopDataset)</text>
    <text x="863" y="301" class="mono">profiles_raw: [u(t-2),u(t-1),u(t),PE]</text>
    <text x="863" y="319" class="hint">shapes: profiles_raw [Cin,N], future_raw [Kmax,N]</text>
  </g>

  <g>
    <rect x="1185" y="255" width="305" height="70" class="node strokeBlue"/>
    <text x="1203" y="279" class="boxTitle">Per-divisor normalization</text>
    <text x="1203" y="301" class="mono">(u_mean,u_std,du_mean,du_std)</text>
    <text x="1203" y="319" class="hint">computed on train segments for each d</text>
  </g>

  <!-- arrows data prep -->
  <path class="arrow" d="M 250 206 L 270 206"/>
  <path class="arrow" d="M 465 206 L 485 206"/>
  <path class="arrow" d="M 735 206 L 755 206"/>
  <path class="arrow" d="M 990 206 L 1010 206"/>

  <path class="arrowSoft" d="M 170 237 L 170 255"/>
  <path class="arrow" d="M 280 290 L 300 290"/>
  <path class="arrow" d="M 560 290 L 580 290"/>
  <path class="arrow" d="M 825 290 L 845 290"/>
  <path class="arrow" d="M 1165 290 L 1185 290"/>

  <!-- ===================== GROUP 2: MODEL FORWARD ===================== -->
  <rect x="35" y="370" width="860" height="580" class="panel strokePurple" filter="url(#glowPurple)"/>
  <text x="60" y="398" class="groupLabel">MODEL FORWARD (GridAgnostic1D)</text>
  <line x1="50" y1="410" x2="880" y2="410" class="divider"/>

  <!-- Model input block -->
  <g>
    <rect x="60" y="435" width="365" height="92" class="node strokePurple"/>
    <text x="78" y="460" class="boxTitle">Inputs</text>
    <text x="78" y="482" class="mono">profiles = concat( u(t-2), u(t-1), u(t), PE )</text>
    <text x="78" y="500" class="mono">normalize u-channels per divisor: (u-u_mean)/u_std</text>
    <text x="78" y="518" class="mono">scalars = [Lx, dt, dx]  (dx optional)</text>
  </g>

  <!-- Stem -->
  <g>
    <rect x="450" y="435" width="400" height="92" class="node strokePurple"/>
    <text x="468" y="460" class="boxTitle">Stem</text>
    <text x="468" y="482" class="mono">Conv1d(Cin→H, k=3, circular, bias=False)</text>
    <text x="468" y="500" class="mono">Norm: BatchNorm1d or LayerNorm</text>
    <text x="468" y="518" class="mono">SiLU + Dropout(p=0.10)</text>
  </g>

  <!-- Residual blocks -->
  <g>
    <rect x="60" y="545" width="790" height="140" class="node strokePurple"/>
    <text x="78" y="570" class="boxTitle">Residual Dilated Blocks (x5)</text>
    <text x="78" y="592" class="mono">Block(d): Conv1d(H→H, k=3, dilation=d, circular) + Norm + SiLU + Dropout</text>
    <text x="78" y="610" class="mono">          Conv1d(H→H, k=3, dilation=1) + Norm + residual add + SiLU</text>
    <text x="78" y="632" class="mono">dilations: 1 → 2 → 4 → 8 → 16</text>
    <text x="78" y="654" class="hint">captures multi-scale spatial context while staying grid-agnostic</text>
  </g>

  <!-- Scalar conditioning -->
  <g>
    <rect x="60" y="700" width="385" height="110" class="node strokePurple"/>
    <text x="78" y="725" class="boxTitle">Scalar conditioning (broadcast)</text>
    <text x="78" y="747" class="mono">MLP: scalar_dim → 128 → 32</text>
    <text x="78" y="765" class="mono">SiLU + Dropout between layers</text>
    <text x="78" y="783" class="mono">expand to [B,32,N] and concat</text>
    <text x="78" y="801" class="hint">scalars: Lx, dt (if available), dx (if enabled)</text>
  </g>

  <!-- Head -->
  <g>
    <rect x="465" y="700" width="385" height="110" class="node strokePurple"/>
    <text x="483" y="725" class="boxTitle">Head</text>
    <text x="483" y="747" class="mono">Conv1d(H+32 → H, k=1) + Norm + SiLU + Dropout</text>
    <text x="483" y="765" class="mono">Conv1d(H → 1, k=1)</text>
    <text x="483" y="783" class="mono">Δu clip: c*tanh(Δu/c)  (c=DU_CLIP_N)</text>
    <text x="483" y="801" class="hint">returns normalized Δu_n; then de-normalize to physical Δu</text>
  </g>

  <!-- Output update -->
  <g>
    <rect x="60" y="830" width="790" height="95" class="node strokePurple"/>
    <text x="78" y="855" class="boxTitle">State update</text>
    <text x="78" y="877" class="mono">Δu = Δu_n * du_std + du_mean</text>
    <text x="78" y="895" class="mono">u_pred = u_t + Δu</text>
    <text x="78" y="913" class="mono">roll: (u(t-2),u(t-1),u(t)) ← (u(t-1),u(t),u_next_in)</text>
  </g>

  <!-- arrows within model forward -->
  <path class="arrow" d="M 425 481 L 450 481"/>
  <path class="arrow" d="M 650 527 L 650 545"/>
  <path class="arrow" d="M 250 685 L 250 700"/>
  <path class="arrow" d="M 650 685 L 650 700"/>
  <path class="arrow" d="M 650 810 L 650 830"/>

  <!-- ===================== GROUP 3: TRAINING / OBJECTIVES ===================== -->
  <rect x="920" y="370" width="845" height="420" class="panel strokeAmber" filter="url(#glowAmber)"/>
  <text x="945" y="398" class="groupLabel">TRAINING (losses, schedules, curriculum)</text>
  <line x1="935" y1="410" x2="1750" y2="410" class="divider"/>

  <!-- Training loop -->
  <g>
    <rect x="945" y="435" width="380" height="135" class="node strokeAmber"/>
    <text x="963" y="460" class="boxTitle">Training loop (per step)</text>
    <text x="963" y="482" class="mono">pick divisor d ~ Uniform({1,2,4})</text>
    <text x="963" y="500" class="mono">batch ← next(train_loader[d])</text>
    <text x="963" y="518" class="mono">lr = cosine(warmup)  AdamW + AMP</text>
    <text x="963" y="536" class="mono">clip_grad_norm=1.0</text>
    <text x="963" y="554" class="hint">torch.compile off; cudagraphs disabled (OOM avoidance)</text>
  </g>

  <!-- Jump training branch -->
  <g>
    <rect x="1345" y="435" width="395" height="165" class="node strokeAmber"/>
    <text x="1363" y="460" class="boxTitle">Jump training branch (JUMP_TRAINING=True)</text>
    <text x="1363" y="482" class="mono">repeat JUMP_SAMPLES_PER_BATCH times</text>
    <text x="1363" y="500" class="mono">sample Δ from {1,2,4,8} (pow2) or uniform</text>
    <text x="1363" y="518" class="mono">unroll j=1..Δ with scheduled sampling</text>
    <text x="1363" y="536" class="mono">endpoint supervision at t+Δ (current code)</text>
    <text x="1363" y="554" class="hint">recommended upgrade: mix endpoint + per-step losses</text>
    <text x="1363" y="572" class="hint">p_tf decays: 0.90 → 0.00 over 60k steps</text>
  </g>

  <!-- Autoregressive branch -->
  <g>
    <rect x="945" y="585" width="380" height="165" class="node strokeAmber"/>
    <text x="963" y="610" class="boxTitle">Autoregressive K-step branch (fallback)</text>
    <text x="963" y="632" class="mono">W[k] ∝ exp(-α·k), α=ROLLOUT_ALPHA</text>
    <text x="963" y="650" class="mono">loss = Σ_k W[k] · step_loss(k)</text>
    <text x="963" y="668" class="mono">scheduled sampling for next input: u_next_in</text>
    <text x="963" y="686" class="mono">curriculum: CURR_K increases when plateau + coverage</text>
    <text x="963" y="704" class="hint">t0 has highest weight; later k down-weighted</text>
    <text x="963" y="722" class="hint">curr_K starts 2, advances to MAX_K=8</text>
  </g>

  <!-- Loss composition -->
  <g>
    <rect x="1345" y="615" width="395" height="135" class="node strokeAmber"/>
    <text x="1363" y="640" class="boxTitle">Loss terms (used in both branches)</text>
    <text x="1363" y="662" class="mono">L_u: weighted MSE(u_pred, u_true)</text>
    <text x="1363" y="680" class="mono">L_du: weighted MSE(Δu_pred, Δu_true)  (BETA_DU=0.5)</text>
    <text x="1363" y="698" class="mono">+ λ_grad·MSE(∇u_pred,∇u_true)</text>
    <text x="1363" y="716" class="mono">+ λ_stats·(μ,σ) match  + λ_fft·|FFT| match</text>
  </g>

  <!-- arrows in training -->
  <path class="arrow" d="M 1325 505 L 1345 505"/>
  <path class="arrow" d="M 1135 570 L 1135 585"/>
  <path class="arrow" d="M 1325 690 L 1345 690"/>

  <!-- Connect data prep to model forward -->
  <path class="arrow" d="M 1490 325 L 910 325 L 910 480 L 895 480" />
  <!-- (a soft elbow arrow: normalization/dataset feeds model forward) -->

  <!-- ===================== GROUP 4: EVALUATION / VISUALIZATION ===================== -->
  <rect x="920" y="810" width="845" height="140" class="panel strokeGreen" filter="url(#glowGreen)"/>
  <text x="945" y="838" class="groupLabel">EVALUATION &amp; ROLLOUT VISUALIZATION</text>
  <line x1="935" y1="850" x2="1750" y2="850" class="divider"/>

  <g>
    <rect x="945" y="870" width="390" height="65" class="node strokeGreen"/>
    <text x="963" y="894" class="boxTitle">Metrics</text>
    <text x="963" y="915" class="mono">one-step loss + RMSE; K-step free-run loss (val/test)</text>
    <text x="963" y="933" class="hint">eval_K = curr_K (or MAX_K)</text>
  </g>

  <g>
    <rect x="1360" y="870" width="380" height="65" class="node strokeGreen"/>
    <text x="1378" y="894" class="boxTitle">Rollouts</text>
    <text x="1378" y="915" class="mono">multi-start on test chains; heatmaps truth vs pred; RMSE curve</text>
    <text x="1378" y="933" class="hint">native grid: divisor=1 (N=512) + optional coarse grids</text>
  </g>

  <!-- arrows training -> eval -->
  <path class="arrow" d="M 1345 740 L 1345 810"/>
  <path class="arrow" d="M 1135 750 L 1135 810"/>

  <!-- Legend / notes -->
  <g opacity="0.95">
    <rect x="40" y="950" width="840" height="80" rx="16" ry="16" fill="rgba(16,22,40,0.85)" stroke="rgba(255,255,255,0.10)"/>
    <text x="60" y="960" class="boxTitle">Notes / knobs</text>
    <text x="60" y="980" class="boxText">• Time weighting: W[k] ∝ exp(-αk) ⇒ k=0 highest weight, later steps down-weighted (α=ROLLOUT_ALPHA).</text>
    <text x="60" y="995" class="boxText">• Jump branch currently uses endpoint loss at t+Δ. If rollouts are “smooth but wrong”, mixing in per-step losses is usually the biggest fix.</text>
  </g>
</svg>
